<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CornField</title>
    <link rel="preload" href="/assets/brand/CornFieldLogo1.png?v=20260407-2" as="image" type="image/png" />
    <link rel="icon" href="/assets/brand/CornFieldLogo1-32.png?v=20260407-2" type="image/png" sizes="32x32" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <div class="ambient" aria-hidden="true"></div>
    <div id="app">
      <header class="topbar">
        <div class="brand" id="goLibrary">
          <img class="brand-logo" src="/assets/brand/CornFieldLogo1.png?v=20260407-2" alt="CornField logo" width="160" height="160" loading="eager" fetchpriority="high" decoding="sync" />
          <span class="brand-text">
            <span class="brand-mark">CornField</span>
          </span>
        </div>
        <nav class="nav-links">
          <button id="navLibrary" class="link-btn">Library</button>
          <button id="navStarrings" class="link-btn">Starring</button>
        </nav>
        <div class="topbar-actions">
          <button id="navDatabase" class="link-btn">Video DB</button>
          <button id="openSettings" class="settings-btn icon-btn" title="Settings" aria-label="Open settings">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
          </button>
        </div>
      </header>

      <main id="main"></main>

      <footer class="site-footer">
        <span class="footer-mark">CornField</span>
        <span class="footer-rule" aria-hidden="true"></span>
        <span class="footer-tag">Late-night screenings, curated by you.</span>
      </footer>
    </div>

    <dialog id="settingsDialog" class="settings-dialog">
      <form id="settingsForm" method="dialog">
        <h2><span class="eyebrow">— Preferences</span>Settings</h2>
        <label>
          Arrow Key Skip Seconds
          <select id="skipSecondsInput">
            <option value="5">5 seconds</option>
            <option value="10">10 seconds</option>
            <option value="15">15 seconds</option>
          </select>
        </label>
        <label>
          Library Rows Per Page
          <select id="libraryRowsInput">
            <option value="2">2 rows</option>
            <option value="3">3 rows</option>
            <option value="4">4 rows</option>
            <option value="5">5 rows</option>
          </select>
        </label>
        <label>
          Playbar Auto-hide Delay
          <select id="controlsHideMsInput">
            <option value="0">Never hide</option>
            <option value="1500">1.5 seconds</option>
            <option value="2500">2.5 seconds</option>
            <option value="4000">4 seconds</option>
            <option value="6000">6 seconds</option>
          </select>
        </label>
        <label>
          Library Folder Path
          <div class="settings-path-row">
            <input id="libraryRootInput" type="text" placeholder="C:\Videos or /Users/you/Videos" required />
            <button type="button" id="browseLibraryRootBtn" class="settings-browse-btn">Browse</button>
            <button type="button" id="scanNowBtn" class="primary settings-scan-btn">Scan Library</button>
          </div>
        </label>
        <div id="scanPreviewBox" class="scan-preview-box" hidden>
          <div id="scanPreviewText" class="status"></div>
          <div class="dialog-actions">
            <button type="button" id="scanProceedBtn" class="primary">Proceed</button>
            <button type="button" id="scanCancelBtn">Cancel</button>
          </div>
        </div>
        <div id="scanStatusText" class="scan-status-text" hidden></div>
        <div class="dialog-actions">
          <button type="button" id="closeSettings">Close</button>
        </div>
      </form>
    </dialog>

    <dialog id="noteEditDialog" class="settings-dialog note-edit-dialog">
      <form id="noteEditForm" method="dialog">
        <h2><span class="eyebrow">— Timeline</span>Edit Jump Marker</h2>
        <label>
          Time
          <input id="noteEditTimestampInput" type="text" placeholder="mm:ss" required />
        </label>
        <label>
          Label
          <input id="noteEditMemoInput" type="text" placeholder="Marker Name(Optional)" />
        </label>
        <div class="dialog-actions">
          <button type="button" id="noteEditUseCurrentBtn">Use Current Time</button>
          <button type="button" id="noteEditCancelBtn">Cancel</button>
          <button type="submit" class="primary">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="confirmDialog" class="settings-dialog confirm-dialog">
      <div id="confirmDialogMessage"></div>
      <div class="dialog-actions">
        <button type="button" id="confirmDialogOk" class="primary">Delete</button>
        <button type="button" id="confirmDialogCancel">Cancel</button>
      </div>
    </dialog>

    <dialog id="commentEditDialog" class="settings-dialog comment-edit-dialog">
      <form id="commentEditForm" method="dialog">
        <h2><span class="eyebrow">— Reflection</span>Edit Review</h2>
        <label>
          Review
          <textarea id="commentEditContentInput" placeholder="Write a comment"></textarea>
        </label>
        <div class="comment-rating-field">
          <div id="commentEditRatingEditor" class="rating-editor">
            <input id="commentEditRatingInput" type="hidden" data-rating-input />
            <div id="commentEditRatingLabel" class="rating-label" data-rating-label>No rating</div>
          </div>
        </div>
        <div class="dialog-actions">
          <button type="button" id="commentEditCancelBtn">Cancel</button>
          <button type="submit" class="primary">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="deleteConfirmDialog" class="settings-dialog delete-confirm-dialog">
      <form id="deleteConfirmForm" method="dialog">
        <h2 id="deleteConfirmTitle"><span class="eyebrow">— Caution</span>Delete Video?</h2>
        <div id="deleteConfirmMessage" class="delete-confirm-copy"></div>
        <div id="deleteConfirmDetails" class="delete-confirm-details"></div>
        <div class="warning delete-confirm-warning">
          This action cannot be undone.
        </div>
        <div class="dialog-actions delete-confirm-actions">
          <button type="button" id="deleteConfirmCancelBtn">Cancel</button>
          <button type="button" id="deleteConfirmMetadataBtn" class="warning-btn delete-confirm-metadata-btn">Delete Metadata Only</button>
          <button type="button" id="deleteConfirmProceedBtn" class="danger-btn">Delete Video</button>
        </div>
      </form>
    </dialog>

    <template id="libraryViewTemplate">
      <section class="library-toolbar">
        <div class="toolbar-head">
          <span class="eyebrow">— The Library</span>
          <h1 class="display-title">Tonight's <em>Selection</em></h1>
          <p class="display-sub">Browse the archive. Choose what to watch in the dark.</p>
        </div>
        <div class="toolbar-grid">
          <input id="searchInput" type="search" placeholder="Search title, file, category, tag, starring…" />
          <select id="qualityFilter">
            <option value="">All Quality</option>
            <option value="720">720p or higher</option>
            <option value="1080">1080p or higher</option>
            <option value="1440">1440p or higher</option>
          </select>
          <select id="sortSelect">
            <option value="random">Shuffled</option>
            <option value="views_desc">Views — High to Low</option>
            <option value="views_asc">Views — Low to High</option>
            <option value="rating_desc">Rating — High to Low</option>
            <option value="rating_asc">Rating — Low to High</option>
            <option value="upload_desc">Date Added — Newest</option>
            <option value="upload_asc">Date Added — Oldest</option>
          </select>
        </div>
        <div class="tag-scroller-wrap">
          <span class="tag-scroller-label">Tags</span>
          <div id="tagScroller" class="tag-scroller"></div>
        </div>
      </section>
      <section>
        <div id="libraryStatus" class="status"></div>
        <div id="videoGrid" class="video-grid"></div>
        <div id="pager" class="pager"></div>
      </section>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
